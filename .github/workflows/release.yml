name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: GitHub Release
    if: ${{ github.repository_owner == 'rurusasu' }}
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_exists: ${{ steps.release.outputs.tag_exists }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Create release GitHub App token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: read

      - name: Resolve release request
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          set -euo pipefail

          git fetch --force --tags origin

          version="$(
            cargo metadata --no-deps --format-version 1 |
              jq -r 'first(.packages[] | select(.name == "article-collector") | .version) // empty'
          )"
          if [ -z "$version" ]; then
            echo "Could not resolve article-collector version from Cargo metadata" >&2
            exit 1
          fi

          tag="v$version"
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "releases_created=false" >> "$GITHUB_OUTPUT"
            echo "Release tag $tag already exists."
            exit 0
          fi

          echo "tag_exists=false" >> "$GITHUB_OUTPUT"

          release_requested=false
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            release_requested=true
          else
            prs="$(
              gh api \
                -H "Accept: application/vnd.github+json" \
                "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls"
            )"
            pr_head="$(printf '%s' "$prs" | jq -r '.[0].head.ref // empty')"
            pr_title="$(printf '%s' "$prs" | jq -r '.[0].title // empty')"
            echo "Associated PR head: ${pr_head:-none}"
            echo "Associated PR title: ${pr_title:-none}"

            if [[ "$pr_head" == release-plz-* ]]; then
              release_requested=true
            fi
          fi

          if [ "$release_requested" != "true" ]; then
            echo "releases_created=false" >> "$GITHUB_OUTPUT"
            echo "No GitHub release requested for this push."
            exit 0
          fi

          echo "releases_created=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" \
            --target "$GITHUB_SHA" \
            --title "article-collector: $TAG_NAME" \
            --generate-notes

  release-plz-pr:
    name: Release-plz PR
    needs: release
    if: ${{ github.repository_owner == 'rurusasu' && github.event_name == 'push' && needs.release.outputs.tag_exists == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Create release GitHub App token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Run release-plz release-pr
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.release-token.outputs.token }}

  build:
    name: Build (${{ matrix.target }})
    needs: release
    if: ${{ needs.release.outputs.releases_created == 'true' && needs.release.outputs.tag_name != '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: article-collector-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: article-collector-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: article-collector-windows-amd64.exe
          - target: x86_64-apple-darwin
            os: macos-15-intel
            artifact: article-collector-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: article-collector-macos-arm64
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --target "${{ matrix.target }}"
          rustup default stable

      - name: Cache cargo registry & build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker for aarch64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/article-collector ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp target/${{ matrix.target }}/release/article-collector.exe ${{ matrix.artifact }}

      - name: Create release asset upload token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Upload release asset
        run: gh release upload ${{ needs.release.outputs.tag_name }} ${{ matrix.artifact }} --clobber
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
