name: CI

on:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  workflow-security:
    name: Workflow Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Verify workflow hardening
        run: bash scripts/verify-workflow-security.sh

  release-pr-scope:
    name: Release PR Scope
    if: startsWith(github.head_ref, 'release-plz-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Verify release PR changed files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash scripts/verify-release-pr-scope.sh "$PR_NUMBER"

  rust-check:
    name: Rust Check (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Cache cargo registry & build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --locked

      - name: Verify release build
        run: cargo build --release --locked

  toml-check:
    name: TOML Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Taplo
        run: cargo install taplo-cli --version 0.10.0 --locked

      - name: Check TOML formatting
        run: taplo format --check Cargo.toml article-collector.toml release-plz.toml

      - name: Run TOML lint
        run: taplo lint Cargo.toml article-collector.toml release-plz.toml

  script-lint:
    name: Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Install dependencies
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck -x scripts/*.sh
