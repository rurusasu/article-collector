version: "3"

tasks:
  default:
    desc: "利用可能な task を表示"
    cmds:
      - task --list

  collect:
    desc: "Rust CLI で 記事取得 -> 翻訳 -> 保存 -> PR を実行"
    requires:
      vars: [URL]
    preconditions:
      - sh: command -v cargo
        msg: "cargo is required"
      - sh: command -v git
        msg: "git is required"
      - sh: command -v gh
        msg: "gh CLI is required for save-and-pr"
    cmds:
      - cargo run --locked -- collect "{{.URL}}"

  fetch:
    desc: "Rust CLI で URL から記事を取得"
    requires:
      vars: [URL]
    preconditions:
      - sh: command -v cargo
        msg: "cargo is required"
    cmds:
      - cargo run --locked -- fetch "{{.URL}}"

  recommend:
    desc: "Rust CLI で site 名/all/起点 URL からレコメンド/関連リンクを取得"
    requires:
      vars: [TARGET]
    preconditions:
      - sh: command -v cargo
        msg: "cargo is required"
    cmds:
      - cargo run --locked -- recommend "{{.TARGET}}" {{if .LIMIT}}--limit {{.LIMIT}}{{end}} {{if .QUERY}}--query "{{.QUERY}}"{{end}} {{if .CONFIG}}--config "{{.CONFIG}}"{{end}}

  translate:
    desc: "Rust CLI で取得済み JSON を翻訳"
    preconditions:
      - sh: command -v cargo
        msg: "cargo is required"
    cmds:
      - cargo run --locked -- translate {{if .INPUT}}"{{.INPUT}}"{{end}}

  save-and-pr:
    desc: "Rust CLI で翻訳記事を保存して PR 作成"
    requires:
      vars: [URL]
    preconditions:
      - sh: command -v cargo
        msg: "cargo is required"
      - sh: command -v git
        msg: "git is required"
      - sh: command -v gh
        msg: "gh CLI is required"
    cmds:
      - cargo run --locked -- save-and-pr "{{.URL}}"

  install:
    desc: "ローカル checkout から article-collector をインストール"
    cmds:
      - cargo install --path . --locked

  fmt:
    desc: "Rust formatting を検証"
    cmds:
      - cargo fmt --check

  clippy:
    desc: "Rust lint を実行"
    cmds:
      - cargo clippy --all-targets -- -D warnings

  toml-fmt:
    desc: "TOML formatting を検証"
    preconditions:
      - sh: command -v taplo
        msg: "taplo CLI is required"
    cmds:
      - taplo format --check Cargo.toml article-collector.toml

  toml-lint:
    desc: "TOML lint を実行"
    preconditions:
      - sh: command -v taplo
        msg: "taplo CLI is required"
    cmds:
      - taplo lint Cargo.toml article-collector.toml

  toml-check:
    desc: "TOML formatting と lint を検証"
    cmds:
      - task: toml-fmt
      - task: toml-lint

  test:
    desc: "Rust unit tests を実行"
    cmds:
      - cargo test --locked

  build:
    desc: "release build を検証"
    cmds:
      - cargo build --release --locked

  lint:
    desc: "Rust、TOML、検証スクリプトを lint"
    cmds:
      - task: fmt
      - task: clippy
      - task: toml-check
      - shellcheck scripts/*.sh
      - task: workflow-security

  workflow-security:
    desc: "GitHub Actions の release automation hardening を検証"
    cmds:
      - bash scripts/verify-workflow-security.sh

  check:
    desc: "CI 相当のローカル検証"
    cmds:
      - task: lint
      - task: test
      - task: build

  verify-pr:
    desc: "PR チェックリストを自動検証"
    requires:
      vars: [PR_NUMBER]
    preconditions:
      - sh: command -v gh
        msg: "gh CLI is required"
    cmds:
      - bash scripts/verify-pr.sh {{.PR_NUMBER}}

  verify-local:
    desc: "PR なしで全ルールをローカル実行"
    cmds:
      - bash scripts/verify-pr.sh --local
